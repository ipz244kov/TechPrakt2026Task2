<header><h1>Головні новини</h1></header>
<main id="news-container">
    <article class="new-item">
        <h2>Дрони атакували москву</h2>
        <img src="images/image_1_1.jpg" alt="Атака дронів">
        <p>Під час масованої атаки вночі проти 18 червня
            на підльоті до Москви було знешкоджено близько
            200 безпілотників, деякі з них досягли
            нафтопереробного заводу.
           <br>Всього з початку доби було збито близько
            194 безпілотників, але Собянін уточнив,
            що робота ППО триває.</p>
    </article>
</main>
